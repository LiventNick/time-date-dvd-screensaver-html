<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode Screensaver</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
  }

  #clock {
    position: absolute;
    text-align: center;
    white-space: nowrap;
    will-change: transform;
  }

  #time {
    font-size: 4em;
    font-weight: bold;
  }

  #date {
    font-size: 1.5em;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div id="clock">
  <div id="time"></div>
  <div id="date"></div>
</div>

<script>
  const clock    = document.getElementById("clock");
  const timeElem = document.getElementById("time");
  const dateElem = document.getElementById("date");

  // Always dark — no day/night switching
  document.body.style.background = "black";
  document.body.style.color = "white";

  // === CLOCK UPDATE ===
  function updateClock() {
    const now = new Date();
    timeElem.textContent = now.toLocaleTimeString('en-US', { hour12: true });
    const day        = now.toLocaleDateString('en-US', { weekday: 'long' });
    const dateString = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    dateElem.textContent = `${day}, ${dateString}`;
  }

  updateClock();
  setInterval(updateClock, 1000);

  // === BOUNCE ===
  let x = 100, y = 100;
  let dx = 1.2, dy = 1.2;

  function bounce() {
    const rect   = clock.getBoundingClientRect();
    const width  = window.innerWidth;
    const height = window.innerHeight;

    x += dx;
    y += dy;

    if (x + rect.width  >= width  || x <= 0) dx = -dx;
    if (y + rect.height >= height || y <= 0) dy = -dy;

    clock.style.transform = `translate(${x}px, ${y}px)`;
    requestAnimationFrame(bounce);
  }

  bounce();

  window.addEventListener("resize", () => {
    x = Math.min(x, window.innerWidth  - clock.offsetWidth);
    y = Math.min(y, window.innerHeight - clock.offsetHeight);
  });
</script>

</body>
</html>
